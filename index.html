<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Bytebeat / Floatbeat Player</title>
<style>
  body { font-family: monospace; background:#111; color:#eee; padding:20px; }
  textarea { width:100%; height:120px; background:#000; color:#0f0; }
  button, input { margin-top:10px; margin-right:10px; padding:8px 14px; }
</style>
</head>
<body>

<h2>Bytebeat / Floatbeat</h2>

<textarea id="code">
t * ((t>>12|t>>8)&63&t>>4)
</textarea>

<br>

<label>Sample Rate:
  <input id="rate" type="number" value="8000" min="1000" max="48000" step="1000">
</label>

<br>

<button id="play">Play</button>
<button id="stop">Stop</button>
<button id="reset">Reset Time</button>

<script>
let ctx;
let node;

const workletSource = `
class BytebeatProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.t = 0;
    this.step = 1;

    // deterministic random like most bytebeat sites
    this.rand = 1;

    this.func = (t, env) => 0;

    this.port.onmessage = (e) => {
      if (e.data.reset) {
        this.t = 0;
        return;
      }

      if (e.data.rate) {
        this.step = e.data.rate / sampleRate;
        return;
      }

      try {
        // Build classic bytebeat environment
        this.func = new Function("t", "env", \`
          with (env) {
            return \${e.data.code};
          }
        \`);
      } catch {
        this.func = () => 0;
      }
    };
  }

  process(inputs, outputs) {
    const out = outputs[0][0];

    for (let i = 0; i < out.length; i++) {
      const env = {
        sin: Math.sin,
        cos: Math.cos,
        tan: Math.tan,
        abs: Math.abs,
        pow: Math.pow,
        floor: Math.floor,
        random: () => {
          // simple LCG
          this.rand = (this.rand * 16807) % 2147483647;
          return this.rand / 2147483647;
        }
      };

      let v = 0;

      try {
        v = this.func(this.t, env);
      } catch {
        v = 0;
      }

      if (v > 1 || v < -1) {
        v = ((v & 255) / 128) - 1;
      }

      out[i] = v;
      this.t += this.step;
    }

    return true;
  }
}

registerProcessor("bytebeat-processor", BytebeatProcessor);
`;

async function setupWorklet(audioCtx) {
  const blob = new Blob([workletSource], { type: "application/javascript" });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
}

document.getElementById("play").onclick = async () => {
  if (!ctx) {
    ctx = new AudioContext();
    await setupWorklet(ctx);
  }

  if (node) node.disconnect();

  node = new AudioWorkletNode(ctx, "bytebeat-processor");
  node.connect(ctx.destination);

  node.port.postMessage({ code: document.getElementById("code").value });
  node.port.postMessage({ rate: Number(document.getElementById("rate").value) });
};

document.getElementById("stop").onclick = () => {
  if (node) {
    node.disconnect();
    node = null;
  }
};

document.getElementById("reset").onclick = () => {
  if (node) node.port.postMessage({ reset: true });
};

document.getElementById("rate").oninput = () => {
  if (node) {
    node.port.postMessage({ rate: Number(document.getElementById("rate").value) });
  }
};
</script>

</body>
</html>
