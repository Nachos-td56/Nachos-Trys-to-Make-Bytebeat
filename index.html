<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bytebeat v2</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; margin:0; }
        /* Style the Monaco container to replace the old textarea */
        #editor { 
            width: 100%; 
            height: 160px; 
            border: 2px solid #0f0; 
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button { padding: 12px 24px; margin: 5px; font-size: 1.2em; background: #0f0; color: #111; border: none; cursor: pointer; }
        button:hover { background: #ff0; }
        select, input { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px; }
        canvas { width: 100%; height: 220px; background: #000; border: 2px solid #0f0; margin: 15px 0; }
        #log { color: #ff0; background: #111; padding: 8px; border: 1px solid #ff0; height: 60px; overflow:auto; }
    </style>
    <!-- Load Monaco Editor Dependency Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>bytebeat v2</h1>
        
        <!-- Replacing textarea with Monaco container -->
        <div id="editor"></div>
        
        <div>
            <button id="play">▶ Play</button>
            <button id="stop">■ Stop</button>
            <select id="mode">
                <option value="byte">Unsigned Bytebeat</option>
                <option value="signed" selected>Signed Bytebeat</option>
                <option value="float">Floatbeat</option>
            </select>
            <select id="style">
                <option value="simple" selected>Expression (Simple)</option>
                <option value="complex">Statement / Funcbeat (Complex)</option>
            </select>
            <label>Rate <input id="rate" type="number" value="48000" style="width:80px;"> Hz</label>
            <label>Vol <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85"></label>
        </div>

        <canvas id="viz" width="800" height="220"></canvas>
        <div id="log">Loading Monaco Editor...</div>
    </div>

    <script>
        let audioCtx, workletNode, analyser, animationFrame;
        let isPlaying = false;
        let editor; // Global Monaco instance
        const logEl = document.getElementById('log');

        function log(msg) { logEl.textContent = msg; console.log(msg); }

        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        const modeSelect = document.getElementById('mode');
        const styleSelect = document.getElementById('style');
        const rateInput = document.getElementById('rate');
        const volInput = document.getElementById('vol');

        // Define the AudioWorklet Processor source code in a string
        const workletCode = `
            class BytebeatProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.t = 0;
                    this.byteFunc = null;
                    this.mode = 'byte';
                    this.rate = 48000;
                    this.vol = 0.85;

                    this.port.onmessage = (e) => {
                        const data = e.data;
                        if (data.type === 'init') {
                            // Compile the function inside the worker thread
                            try {
                                this.byteFunc = new Function('t', data.helper + data.code);
                                this.mode = data.mode;
                                this.rate = data.rate;
                                this.vol = data.vol;
                                this.t = 0; // Reset time on compile
                            } catch (err) {
                                this.port.postMessage({ type: 'error', message: err.message });
                            }
                        } else if (data.type === 'updateParams') {
                            this.mode = data.mode;
                            this.rate = data.rate;
                            this.vol = data.vol;
                        }
                    };
                }

                process(inputs, outputs, parameters) {
                    const output = outputs[0];
                    const channel = output[0];
                    if (!channel) return true;

                    if (!this.byteFunc) {
                        for (let i = 0; i < channel.length; i++) channel[i] = 0;
                        return true;
                    }

                    const speed = this.rate / sampleRate;

                    for (let i = 0; i < channel.length; i++) {
                        try {
                            let val = this.byteFunc(Math.floor(this.t));
                            
                            if (this.mode === 'float') {
                                val = val || 0;
                            } else if (this.mode === 'signed') {
                                val = (((val & 255) << 24) >> 24) / 128;
                            } else {
                                val = ((val & 255) / 128) - 1;
                            }

                            channel[i] = this.vol * val;
                            this.t += speed;
                        } catch(err) {
                            channel[i] = 0;
                        }
                    }
                    return true;
                }
            }
            registerProcessor('bytebeat-processor', BytebeatProcessor);
        `;

        // Configure and Load Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.48.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            // Define custom green retro theme
            monaco.editor.defineTheme('bytebeat-theme', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: '', foreground: '00ff00' },
                    { token: 'keyword', foreground: 'ffffff', fontStyle: 'bold' },
                    { token: 'number', foreground: 'ffff00' },
                    { token: 'comment', foreground: '006600', fontStyle: 'italic' }
                ],
                colors: {
                    'editor.background': '#222222',
                    'editor.foreground': '#00ff00',
                    'editorLineNumber.foreground': '#005500',
                    'editorLineNumber.activeForeground': '#00ff00',
                    'editor.lineHighlightBackground': '#1a331a',
                }
            });

            // Initialize the editor inside our div
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: `((4E4/(t&2**13-1)*'1001101110011010'[15&t>>13]&128)+(t*sin(t>>2)*'00100011'[7&t>>14]&128)%256*(-t&2**14-1)/2E4+(t*[1,1.2,1.35,1.5][3&t>>16]>>2&128)+(t/16*'8867'[3&t>>15]*'1232'[3&t>>13]&128))/1.5 
                        // bytebeat from https://www.reddit.com/r/bytebeat/comments/14je5fs/frodo_and_the_magic_weed`,
                language: 'javascript',
                theme: 'bytebeat-theme',
                minimap: { enabled: false },
                lineNumbers: 'on',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'monospace'
            });

            log("Ready...");
        });

        function drawVisualizer() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.fftSize);
            analyser.getByteTimeDomainData(data);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.lineWidth = 3; ctx.strokeStyle = '#0f0'; ctx.shadowBlur = 10; ctx.shadowColor = '#0f0';
            ctx.beginPath();
            const slice = canvas.width / data.length;
            let x = 0;
            for (let i = 0; i < data.length; i++) {
                const y = (data[i] / 128) * canvas.height / 2;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                x += slice;
            }
            ctx.stroke();
            animationFrame = requestAnimationFrame(drawVisualizer);
        }

        // Live parameter updates (rate, volume, mode) without stopping audio
        function updateRuntimeParams() {
            if (workletNode) {
                workletNode.port.postMessage({
                    type: 'updateParams',
                    mode: modeSelect.value,
                    rate: parseFloat(rateInput.value) || 44100,
                    vol: +volInput.value
                });
            }
        }

        rateInput.oninput = updateRuntimeParams;
        volInput.oninput = updateRuntimeParams;
        modeSelect.onchange = updateRuntimeParams;

        document.getElementById('play').onclick = async () => {
            if (isPlaying) return;
            if (!editor) {
                log("Wait for Monaco Editor to finish loading...");
                return;
            }
            
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Create an object URL from the worklet code string and load it
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    await audioCtx.audioWorklet.addModule(url);
                    
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 2048;
                }
                await audioCtx.resume();

                // Setup the worklet node
                workletNode = new AudioWorkletNode(audioCtx, 'bytebeat-processor');
                
                // Handle compilation error feedback back from the worker thread
                workletNode.port.onmessage = (e) => {
                    if (e.data.type === 'error') {
                        log("Error in worklet: " + e.data.message);
                    }
                };

                // Prepare user code
                let code = editor.getValue().trim();
                const helper = styleSelect.value === 'simple' ? 
                    `const sin=Math.sin,cos=Math.cos,tan=Math.tan,floor=Math.floor,ceil=Math.ceil,abs=Math.abs,random=Math.random,cbrt=Math.cbrt,sqrt=Math.sqrt,pow=Math.pow,min=Math.min,max=Math.max,pi=Math.PI;
                     let a,b,c,d,e,f,g,h,i,j,k,l,m,n,o,p,q,r,s,u,v,w,x,y,z;` : '';
                
                const finalCode = styleSelect.value === 'complex' ? code + ';return out||val||0;' : 'return ' + code + ';';

                // Send setup details to the processor running on the separate thread
                workletNode.port.postMessage({
                    type: 'init',
                    helper: helper,
                    code: finalCode,
                    mode: modeSelect.value,
                    rate: parseFloat(rateInput.value) || 44100,
                    vol: +volInput.value
                });

                workletNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                isPlaying = true;
                log("Loaded OK");
                drawVisualizer();
            } catch (err) {
                log("Initialization Error: " + err.message);
            }
        };

        document.getElementById('stop').onclick = () => {
            if (workletNode) {
                workletNode.disconnect();
                workletNode = null;
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            isPlaying = false;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            log("Stopped");
        };
    </script>
</body>
</html>
