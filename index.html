<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Nachos Bytebeat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>Bytebeat / Somewhat Floatbeat</h1>

  <textarea id="code">a=t*(t>>10&3)/[1,1.5,1.25,1.3][t>>14&3],(4E4/(t&4095)&127)+(t/[1,1.25,1.5,1.75][t>>15&3]&64)+a%64+a%63</textarea>

  <div class="controls">
    <label>Sample Rate
      <input id="rate" type="number" value="8000">
    </label>

    <button id="play">Play</button>
    <button id="stop">Stop</button>
    <button id="reset">Reset</button>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
