<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bytebeat v2</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: monospace;
            background: #111;
            color: #0f0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        h1 {
            margin: 0 0 15px 0;
            flex-shrink: 0;
        }

        /* Monaco Editor */
        #editor {
            width: 100%;
            flex: 1;
            min-height: 350px;
            border: 2px solid #0f0;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1em;
            background: #0f0;
            color: #111;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #ff0;
        }

        select,
        input {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Warning text on the controls panel */
        .control-note {
            margin-left: auto;
            color: #ff0;
            font-size: 0.95em;
            max-width: 430px;
            line-height: 1.3;
            text-align: left;
        }

        canvas {
            width: 100%;
            height: 220px;
            background: #000;
            border: 2px solid #0f0;
            margin-bottom: 15px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        #log {
            color: #ff0;
            background: #111;
            padding: 8px;
            border: 1px solid #ff0;
            height: 60px;
            overflow: auto;
            box-sizing: border-box;
            flex-shrink: 0;
        }
    </style>

    <!-- Load Monaco Editor Dependency Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>bytebeat v2</h1>

        <!-- Monaco Editor -->
        <div id="editor"></div>

        <!-- Controls -->
        <div class="controls">
            <button id="play">▶ Play</button>
            <button id="stop">■ Stop</button>
            <button id="reset-time">↻ Reset Time</button>
            <button id="export-wav">Export WAV</button>

            <select id="mode">
                <option value="byte" selected>Unsigned Bytebeat (Expression)</option>
                <option value="signed">Signed Bytebeat (Expression)</option>
                <option value="float">Floatbeat (Expression)</option>
                <option value="funcbeat">Funcbeat / Complex Statement (Float)</option>
            </select>

            <label>
                Rate
                <input id="rate" type="number" value="48000" style="width:80px;">
                Hz
            </label>

            <label>
                Vol
                <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85">
            </label>

            <div class="control-note">
                <strong>NOTE: Funcbeat is NOT finished, and may crash.
                It is recommended you don't use it.</strong>
            </div>
        </div>

        <!-- Visualizer -->
        <canvas id="viz" width="800" height="220"></canvas>

        <!-- Log -->
        <div id="log">Loading Monaco Editor...</div>
    </div>

    <script src="app.js"></script>

</body>
</html>
